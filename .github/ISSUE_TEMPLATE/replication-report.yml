name: Replication report
description: Report a replication (confirming or contradicting) of an existing experiment
labels: ['replication']
body:
  - type: input
    id: experiment
    attributes:
      label: Experiment slug
      placeholder: '001-wait-shaped-failures'
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Model + harness versions
      placeholder: 'claude-sonnet-5, Claude Code v2.x, macOS'
    validations:
      required: true
  - type: dropdown
    id: outcome
    attributes:
      label: Outcome
      options:
        - Reproduced
        - Partially reproduced
        - Contradicted
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results
      description: Trial counts, rates observed, and where they diverge from the original.
    validations:
      required: true
  - type: input
    id: artifacts
    attributes:
      label: Artifacts link
      description: Repo/branch/gist with your raw run artifacts.
