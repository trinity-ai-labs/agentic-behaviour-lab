name: Experiment proposal
description: Propose a new behavioural experiment
labels: ["experiment", "proposal"]
body:
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: The behaviour you expect and what would falsify it.
      placeholder: "Agents treat 'waiting on my own sub-agent' as a valid stopping point at rate X unless…"
    validations:
      required: true
  - type: input
    id: subjects
    attributes:
      label: Agents / models under test
      placeholder: "claude-sonnet-5 via Claude Code Agent tool"
    validations:
      required: true
  - type: dropdown
    id: kind
    attributes:
      label: Question kind
      options:
        - Deterministic (harness semantics — establish a fact)
        - Stochastic (model tendency — measure a rate)
        - Both (fact-finding first, then rates)
    validations:
      required: true
  - type: textarea
    id: method
    attributes:
      label: Method sketch
      description: Fixtures, probe shape, conditions, trial counts.
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Expected artifacts
      description: What each trial leaves in runs/ (state logs, final messages, etc.).
    validations:
      required: true
